<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Lavalle App | QR + Logo a PDF | </title>
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 28px 24px 36px;
            transition: all 0.2s;
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #0a2b33;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 22px;
        }

        .field label {
            font-weight: 600;
            color: #1a4a5f;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .field input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 1.5px solid #dce5ec;
            border-radius: 40px;
            background: white;
            font-family: monospace;
            transition: 0.2s;
        }

        .field input:focus {
            outline: none;
            border-color: #2c9baf;
            box-shadow: 0 0 0 3px rgba(44, 155, 175, 0.2);
        }

        /* Color personalizado */
        .color-row {
            margin-bottom: 22px;
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafd;
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #e2edf2;
            flex-wrap: wrap;
        }
        .color-label {
            font-weight: 600;
            color: #1a4a5f;
            font-size: 0.9rem;
        }
        #customColorPicker {
            width: 60px;
            height: 50px;
            border: 2px solid #dce5ec;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            padding: 4px;
        }
        .color-value {
            font-family: monospace;
            background: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f6e8a;
        }

        .logo-zone {
            background: #f8fafd;
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            border: 1px solid #e2edf2;
        }

        .btn-logo {
            background: white;
            border: 1px solid #cbdbe0;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f6e8a;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logo:active {
            background: #eef3fc;
            transform: scale(0.97);
        }

        .logo-preview-mini {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .clear-logo {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #9aaeb9;
            padding: 5px;
        }

        .qr-preview {
            background: #ffffff;
            border-radius: 40px;
            padding: 30px 20px;
            margin: 8px 0 20px;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-frame {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 32px;
        }

        .qr-core {
            position: relative;
        }

        /* QR GRANDE: 420px visual */
        #qrImg {
            display: block;
            width: 420px;
            height: 420px;
            border-radius: 28px;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        .logo-overlay-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22%;
            max-width: 95px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            border: 3px solid white;
        }

        .logo-overlay-center img {
            width: 100%;
            height: auto;
            border-radius: 50%;
            display: block;
        }

        .btn-generate {
            background: #0a2b33;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.15s;
        }

        .btn-generate:active {
            background: #144f5e;
            transform: scale(0.97);
        }

        .btn-pdf-only {
            background: #1f6e8c;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-top: 6px;
        }

        .btn-pdf-only:active {
            background: #0e576f;
            transform: scale(0.97);
        }

        hr {
            margin: 20px 0 14px;
            border: none;
            height: 1px;
            background: #e2edf2;
        }

        .footer-copyright {
            text-align: center;
            font-size: 0.7rem;
            color: #88a3b2;
            margin-top: 20px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @media (max-width: 620px) {
            .card {
                padding: 22px 18px 30px;
            }
            #qrImg {
                width: 320px;
                height: 320px;
            }
            .logo-overlay-center {
                width: 24%;
                max-width: 75px;
            }
        }

        @media (max-width: 480px) {
            #qrImg {
                width: 280px;
                height: 280px;
            }
            .logo-overlay-center {
                max-width: 65px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Lavalle <span style="color:#2c9baf;">App</span></h2>
    
    <div class="field">
        <label>🌐 Enlace o texto para tu negocio</label>
        <input type="text" id="businessLink" placeholder="https://tunegocio.com, WhatsApp, Instagram..." value="https://lavalleapp.com.ar/">
    </div>

    <!-- Solo selector de color personalizado (sin badge ni menú de diseños) -->
    <div class="color-row">
        <div class="color-picker-wrapper">
            <span class="color-label">🎨 Color personalizado del QR</span>
            <input type="color" id="customColorPicker" value="#000000">
            <span id="colorHexDisplay" class="color-value">#000000</span>
        </div>
        <div style="font-size: 0.7rem; color: #6f8f9c; margin-top: 6px; margin-left: 12px;">Elige cualquier color para tu código QR</div>
    </div>

    <div class="logo-zone" id="logoZone">
        <button class="btn-logo" id="selectLogoBtn">➕ Subir logo para centro</button>
        <div id="logoMiniContainer" style="display: none;" class="logo-preview-mini">
            <img id="miniLogoImg" class="mini-logo" alt="logo preview">
            <button id="removeLogoBtn" class="clear-logo" title="Quitar logo">✖</button>
        </div>
        <input type="file" id="logoUpload" accept="image/png, image/jpeg, image/webp" style="display: none;">
    </div>

    <button id="generateQRBtn" class="btn-generate">✨ generar qr para tu negocio</button>

    <div class="qr-preview">
        <div id="qrExportArea" class="qr-frame">
            <div class="qr-core" id="qrCoreWrap">
                <img id="qrImg" src="" alt="QR code">
                <div id="logoOverlay" class="logo-overlay-center" style="display: none;">
                    <img id="overlayLogo" alt="logo marca">
                </div>
            </div>
        </div>
    </div>

    <button id="downloadPDFBtn" class="btn-pdf-only">📄 Descargar PDF (Máxima Calidad)</button>

    <hr>
    <div class="footer-copyright">© 2026 Nahuel Mamani. Todos los derechos reservados.</div>
</div>

<script>
    (function() {
        // Elementos DOM
        const linkInput = document.getElementById('businessLink');
        const generateBtn = document.getElementById('generateQRBtn');
        const qrImgElement = document.getElementById('qrImg');
        const logoOverlayDiv = document.getElementById('logoOverlay');
        const overlayLogoImg = document.getElementById('overlayLogo');
        const selectLogoBtn = document.getElementById('selectLogoBtn');
        const logoUpload = document.getElementById('logoUpload');
        const logoMiniContainer = document.getElementById('logoMiniContainer');
        const miniLogoImg = document.getElementById('miniLogoImg');
        const removeLogoBtn = document.getElementById('removeLogoBtn');
        const downloadPDFBtn = document.getElementById('downloadPDFBtn');
        const qrExportArea = document.getElementById('qrExportArea');
        const customColorPicker = document.getElementById('customColorPicker');
        const colorHexDisplay = document.getElementById('colorHexDisplay');

        // Estados
        let currentQRDataURL = null;
        let currentLogoDataURL = null;
        let logoActive = false;
        let currentColorHex = "#000000";

        // Actualizar display del color
        customColorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            colorHexDisplay.textContent = currentColorHex;
            // Si hay un link válido, regenerar automáticamente con nuevo color
            if (linkInput.value.trim() !== "") {
                updateFullQR();
            }
        });

        // Generar QR con tamaño GRANDÍSIMO (600px internos para máxima calidad, visual 420px)
        function generateStyledQR(text, size = 600, foregroundColor) {
            return new Promise((resolve, reject) => {
                if (!text || text.trim() === "") {
                    reject(new Error("Ingresa un enlace válido"));
                    return;
                }
                const tempDiv = document.createElement('div');
                tempDiv.style.position = 'absolute';
                tempDiv.style.top = '-9999px';
                tempDiv.style.left = '-9999px';
                document.body.appendChild(tempDiv);
                try {
                    const qr = new QRCode(tempDiv, {
                        text: text,
                        width: size,
                        height: size,
                        colorDark: foregroundColor,
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    setTimeout(() => {
                        const canvas = tempDiv.querySelector('canvas');
                        if (canvas) {
                            const data = canvas.toDataURL('image/png');
                            document.body.removeChild(tempDiv);
                            resolve({ dataURL: data, canvasElement: canvas });
                        } else {
                            const imgTag = tempDiv.querySelector('img');
                            if (imgTag && imgTag.src) {
                                resolve({ dataURL: imgTag.src, canvasElement: null });
                            } else {
                                reject(new Error("Error al generar QR con color personalizado"));
                                document.body.removeChild(tempDiv);
                            }
                        }
                    }, 100);
                } catch (err) {
                    document.body.removeChild(tempDiv);
                    reject(err);
                }
            });
        }

        // Actualizar QR en pantalla (visual 420px, fuente 600px)
        async function updateFullQR() {
            const linkValue = linkInput.value.trim();
            if (!linkValue) {
                alert("🔔 Ingresa el enlace de tu negocio");
                return false;
            }
            try {
                const activeColor = customColorPicker.value;
                currentColorHex = activeColor;
                const qrResult = await generateStyledQR(linkValue, 600, currentColorHex);
                currentQRDataURL = qrResult.dataURL;
                qrImgElement.src = currentQRDataURL;
                
                if (logoActive && currentLogoDataURL) {
                    overlayLogoImg.src = currentLogoDataURL;
                    logoOverlayDiv.style.display = 'flex';
                } else {
                    logoOverlayDiv.style.display = 'none';
                }
                return true;
            } catch (error) {
                alert("Error: " + error.message);
                return false;
            }
        }

        // Manejo de logo
        function handleLogoImage(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert("Solo imágenes PNG o JPG para tu logo");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgData = e.target.result;
                currentLogoDataURL = imgData;
                logoActive = true;
                miniLogoImg.src = imgData;
                logoMiniContainer.style.display = 'flex';
                if (currentQRDataURL) {
                    overlayLogoImg.src = imgData;
                    logoOverlayDiv.style.display = 'flex';
                } else {
                    overlayLogoImg.src = imgData;
                }
            };
            reader.readAsDataURL(file);
        }

        function resetLogo() {
            logoActive = false;
            currentLogoDataURL = null;
            logoMiniContainer.style.display = 'none';
            miniLogoImg.src = '';
            logoOverlayDiv.style.display = 'none';
            overlayLogoImg.src = '';
            logoUpload.value = '';
            if (currentQRDataURL) {
                logoOverlayDiv.style.display = 'none';
            }
        }

        // Captura con calidad EXTREMA para PDF
        async function captureUltraHDCanvas() {
            if (!currentQRDataURL) {
                throw new Error("Generá el QR primero");
            }
            await new Promise(r => setTimeout(r, 60));
            const container = qrExportArea;
            if (!container) throw new Error("Área QR no encontrada");
            
            const canvas = await html2canvas(container, {
                scale: 5.5,                
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: false,
                allowTaint: false,
                imageTimeout: 0,
                onclone: (clonedDoc, element) => {
                    const clonedContainer = clonedDoc.getElementById('qrExportArea');
                    if (clonedContainer) clonedContainer.style.transform = 'none';
                }
            });
            return canvas;
        }

        async function generatePremiumPDF() {
            if (!currentQRDataURL) {
                alert("✨ Primero generá el QR para tu negocio");
                return false;
            }
            try {
                downloadPDFBtn.innerText = "⏳ Generando PDF profesional...";
                downloadPDFBtn.disabled = true;
                
                const ultraCanvas = await captureUltraHDCanvas();
                const imgDataURL = ultraCanvas.toDataURL('image/png');
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4',
                    compress: false
                });
                
                const pageWidth = pdf.internal.pageSize.getWidth();   // ~210mm
                const pageHeight = pdf.internal.pageSize.getHeight();  // ~297mm
                
                // QR más grande en el PDF: 130mm de ancho (protagonista)
                const targetWidthMM = 130;
                const aspectRatio = ultraCanvas.height / ultraCanvas.width;
                const targetHeightMM = targetWidthMM * aspectRatio;
                
                const xPos = (pageWidth - targetWidthMM) / 2;
                let yPos = (pageHeight - targetHeightMM) / 3.5;
                if (yPos < 28) yPos = 28;
                
                pdf.addImage(imgDataURL, 'PNG', xPos, yPos, targetWidthMM, targetHeightMM, undefined, 'NONE');
                
                const linkText = linkInput.value.trim();
                if (linkText) {
                    pdf.setFontSize(11);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setTextColor(20, 60, 75);
                    pdf.text(linkText, pageWidth / 2, yPos + targetHeightMM + 10, { align: 'center' });
                }
                
                pdf.setFontSize(9);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(90, 115, 130);
                pdf.text("Lavalle App · Código QR profesional", pageWidth / 2, pageHeight - 22, { align: 'center' });
                
                pdf.setFontSize(7.5);
                pdf.setTextColor(130, 150, 168);
                pdf.text("© 2026 Nahuel Mamani. Todos los derechos reservados.", pageWidth / 2, pageHeight - 12, { align: 'center' });
                
                pdf.save(`QR_LavalleApp_${Date.now()}.pdf`);
                
                downloadPDFBtn.innerText = "📄 Descargar PDF (Máxima Calidad)";
                downloadPDFBtn.disabled = false;
                return true;
            } catch (error) {
                console.error(error);
                downloadPDFBtn.innerText = "📄 Descargar PDF (Máxima Calidad)";
                downloadPDFBtn.disabled = false;
                alert("Error generando PDF: " + error.message);
                return false;
            }
        }

        // Event listeners
        selectLogoBtn.addEventListener('click', () => logoUpload.click());
        logoUpload.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) handleLogoImage(e.target.files[0]);
        });
        removeLogoBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetLogo();
        });
        generateBtn.addEventListener('click', async () => {
            await updateFullQR();
        });
        downloadPDFBtn.addEventListener('click', async () => {
            await generatePremiumPDF();
        });
        
        // Inicializar QR con la URL de ejemplo y color negro #000000
        window.addEventListener('load', async () => {
            linkInput.value = "https://lavalleapp.com.ar/";
            customColorPicker.value = "#000000";
            colorHexDisplay.textContent = "#000000";
            currentColorHex = "#000000";
            await updateFullQR();
        });
    })();
</script>
</body>
</html>
